
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { margin-bottom: 2rem; }
.header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.header p { font-size: 14px; color: var(--color-text-secondary); }
.progress-bar-wrap { background: var(--color-background-secondary); border-radius: 999px; height: 6px; margin-bottom: 2rem; overflow: hidden; }
.progress-bar-fill { height: 6px; background: var(--color-text-primary); border-radius: 999px; transition: width 0.3s ease; }
.category-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
.question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.q-number { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.q-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
.vs { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; padding: 2px 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: 999px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.opt-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; font-size: 13px; color: var(--color-text-primary); cursor: pointer; text-align: left; line-height: 1.5; transition: all 0.15s; }
.opt-btn:hover { border-color: var(--color-border-primary); background: var(--color-background-primary); }
.opt-btn.selected { border-color: var(--color-text-primary); background: var(--color-background-primary); font-weight: 500; }
.nav { display: flex; gap: 8px; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
.nav-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 20px; font-size: 14px; color: var(--color-text-primary); cursor: pointer; }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.count-label { font-size: 13px; color: var(--color-text-secondary); }
#result-view { display: none; }
.result-header { margin-bottom: 1.5rem; }
.result-header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.result-header p { font-size: 14px; color: var(--color-text-secondary); }
.result-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; font-size: 13px; color: var(--color-text-primary); line-height: 1.8; white-space: pre-wrap; font-family: var(--font-mono); max-height: 480px; overflow-y: auto; }
.copy-btn { width: 100%; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 12px; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
.copy-btn:hover { opacity: 0.85; }
.restart-btn { width: 100%; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.copy-notice { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 6px; }
</style>

<div id="app">
  <div id="quiz-view">
    <div class="header">
      <h1>디자이너 밸런스게임</h1>
      <p>두 가지 중 더 끌리는 것을 선택하세요. 정답은 없습니다.</p>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress" style="width:2%"></div></div>
    <div class="category-label" id="cat-label"></div>
    <div class="question-card">
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options">
        <button class="opt-btn" id="opt-a" onclick="selectOption('A')"></button>
        <button class="opt-btn" id="opt-b" onclick="selectOption('B')"></button>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn" id="prev-btn" onclick="prevQ()" disabled>이전</button>
      <span class="count-label" id="count-label"></span>
      <button class="nav-btn primary" id="next-btn" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>

  <div id="result-view">
    <div class="result-header">
      <h2>문답 결과</h2>
      <p>아래 텍스트를 복사해서 Claude 또는 NotebookLM에 붙여넣으세요.</p>
    </div>
    <div class="result-box" id="result-text"></div>
    <button class="copy-btn" onclick="copyResult()">결과 복사하기</button>
    <div class="copy-notice" id="copy-notice"></div>
    <button class="restart-btn" onclick="restart()">다시 하기</button>
  </div>
</div>

<script>

  { cat: "조형·디자인", a: "시간이 지나도 변하지 않는 디자인을 한다", b: "지금 이 순간에 가장 적합한 디자인을 한다" },
  { cat: "조형·디자인", a: "사용할 때 느껴지는 경험이 가장 중요하다", b: "처음 봤을 때의 인상이 가장 중요하다" },
  { cat: "조형·디자인", a: "제품이 어떻게 만들어졌는지 보여야 한다", b: "제품이 어떻게 만들어졌는지는 중요하지 않다" },
  { cat: "조형·디자인", a: "색보다 형태가 먼저다", b: "형태보다 색이 먼저다" },
  { cat: "조형·디자인", a: "디지털보다 물리적 제품이 더 끌린다", b: "물리적 제품보다 디지털이 더 끌린다" },
  { cat: "조형·디자인", a: "완성된 느낌의 마감이 좋다", b: "날것의 느낌이 남아있는 마감이 좋다" },
  { cat: "마케팅·브랜딩", a: "제품이 좋으면 마케팅은 따라온다", b: "마케팅도 디자인만큼 중요하다" },
  { cat: "마케팅·브랜딩", a: "브랜드 스토리보다 제품 자체가 말해야 한다", b: "브랜드 스토리가 제품의 가치를 만든다" },
  { cat: "마케팅·브랜딩", a: "많은 사람에게 알려지는 게 중요하다", b: "알아야 할 사람만 알면 된다" },

  { cat: "마케팅·브랜딩", a: "브랜드 이미지는 일관성이 가장 중요하다", b: "브랜드 이미지는 유연하게 변할 수 있어야 한다" },

  { cat: "브랜드 가치관", a: "디자인은 문제를 해결하는 도구다", b: "디자인은 세계관을 표현하는 언어다" },
  { cat: "브랜드 가치관", a: "나의 디자인이 많은 사람의 삶을 바꾸길 원한다", b: "나의 디자인이 한 사람의 삶을 깊이 바꾸길 원한다" },
  { cat: "브랜드 가치관", a: "지속 가능성은 디자인의 필수 조건이다", b: "지속 가능성은 중요하지만 절충할 수 있다" },
  { cat: "브랜드 가치관", a: "10년 후에도 내 이름으로 작업하고 싶다", b: "10년 후에는 더 큰 시스템 안에서 일하고 싶다" }

const total = questions.length;
let current = 0;
let answers = new Array(total).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('cat-label').textContent = q.cat;
  document.getElementById('q-number').textContent = `Q${current + 1}`;
  document.getElementById('q-text').innerHTML = `<span>${q.a}</span><span class="vs">vs</span><span>${q.b}</span>`;
  document.getElementById('opt-a').textContent = 'A  ' + q.a;
  document.getElementById('opt-b').textContent = 'B  ' + q.b;
  document.getElementById('opt-a').className = 'opt-btn' + (answers[current] === 'A' ? ' selected' : '');
  document.getElementById('opt-b').className = 'opt-btn' + (answers[current] === 'B' ? ' selected' : '');
  document.getElementById('count-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('prev-btn').disabled = current === 0;
  const isLast = current === total - 1;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = isLast ? '결과 보기' : '다음';
  nextBtn.disabled = answers[current] === null;
  document.getElementById('progress').style.width = Math.max(2, Math.round((current + 1) / total * 100)) + '%';
}

function selectOption(opt) {
  answers[current] = opt;
  render();
}

function nextQ() {
  if (current === total - 1) { showResult(); return; }
  current++;
  render();
}

function prevQ() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  const lines = ['[디자이너 밸런스게임 문답 결과]\n'];
  let lastCat = '';
  questions.forEach((q, i) => {
    if (q.cat !== lastCat) {
      lines.push(`\n▶ ${q.cat}`);
      lastCat = q.cat;
    }
    const chosen = answers[i] === 'A' ? q.a : q.b;
    const other = answers[i] === 'A' ? q.b : q.a;
    lines.push(`Q${i + 1}. ${q.a} vs ${q.b}\n→ 선택: ${chosen}`);
  });
  lines.push('\n---\n이 결과를 Claude 또는 NotebookLM에 붙여넣어 분석을 진행하세요.');
  document.getElementById('result-text').textContent = lines.join('\n');
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
}

function copyResult() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-notice').textContent = '복사됐어요. Claude 또는 NotebookLM에 붙여넣으세요.';
  });
}

function restart() {
  current = 0;
  answers = new Array(total).fill(null);
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('copy-notice').textContent = '';
  render();
}

render();
</script>
