
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; font-family: var(--font-sans); }
h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 12px; }
.desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 2rem; padding: 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
.start-btn { display: block; width: 100%; padding: 14px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 15px; cursor: pointer; margin-bottom: 10px; }
.start-btn:hover { opacity: 0.85; }
.start-info { text-align: center; font-size: 13px; color: var(--color-text-secondary); }
.progress-wrap { height: 4px; background: var(--color-background-secondary); border-radius: 999px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill { height: 4px; background: var(--color-text-primary); border-radius: 999px; transition: width 0.25s ease; }
.meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.cat-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
.q-count { font-size: 12px; color: var(--color-text-secondary); }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.choice-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1rem; font-size: 13px; color: var(--color-text-primary); cursor: pointer; line-height: 1.6; text-align: center; transition: all 0.15s; }
.choice-card:hover { border-color: var(--color-border-primary); background: var(--color-background-secondary); }
.choice-card.selected { border-color: var(--color-text-primary); border-width: 1.5px; background: var(--color-background-primary); font-weight: 500; }
.vs-badge { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--color-text-secondary); padding: 2px 8px; }
.nav { display: flex; align-items: center; justify-content: space-between; }
.back-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.skip-hint { font-size: 12px; color: var(--color-text-secondary); }
.result-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.result-desc { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }
.result-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; font-size: 12px; color: var(--color-text-primary); line-height: 1.9; white-space: pre-wrap; font-family: var(--font-mono); max-height: 400px; overflow-y: auto; margin-bottom: 1rem; }
.copy-btn { width: 100%; padding: 13px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; margin-bottom: 8px; }
.copy-btn:hover { opacity: 0.85; }
.restart-btn { width: 100%; padding: 10px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.copy-notice { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 6px; }
@media (max-width: 480px) {
  .choices { grid-template-columns: 1fr; }
}
</style>

<div id="app">
  <div id="intro">
    <h1>디자이너 밸런스게임</h1>
    <p class="subtitle">나의 디자인 가치관과 우선순위를 발견하는 도구</p>
    <div class="desc">두 가지 중 더 끌리는 것을 선택하세요. 정답은 없습니다.<br>선택의 패턴이 나의 브랜드 철학과 디자인 성향을 드러냅니다.<br>결과는 AI 퍼스널 브랜드 분석의 입력 데이터로 활용됩니다.</div>
    <button class="start-btn" onclick="startQuiz()">시작하기</button>
    <p class="start-info">총 50문항 · 약 10분 소요</p>
  </div>

  <div id="quiz" style="display:none">
    <div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
    <div class="meta">
      <span class="cat-label" id="cat"></span>
      <span class="q-count" id="qcount"></span>
    </div>
    <div class="choices">
      <div class="choice-card" id="card-a" onclick="pick('A')"></div>
      <div class="choice-card" id="card-b" onclick="pick('B')"></div>
    </div>
    <div class="nav">
      <button class="back-btn" id="back-btn" onclick="goBack()" disabled>이전</button>
      <span class="skip-hint">선택하면 자동으로 넘어갑니다</span>
    </div>
  </div>

  <div id="result" style="display:none">
    <p class="result-title">완료했어요</p>
    <p class="result-desc">아래 결과를 복사해서 Claude 또는 NotebookLM에 붙여넣으세요.<br>AI가 이 데이터를 바탕으로 퍼스널 브랜드를 분석해줍니다.</p>
    <div class="result-box" id="result-text"></div>
    <button class="copy-btn" onclick="copyResult()">결과 복사하기</button>
    <div class="copy-notice" id="copy-notice"></div>
    <button class="restart-btn" onclick="restart()">다시 하기</button>
  </div>
</div>

  {cat:"아이디에이션",a:"즉각적인 변화를 만드는 솔루션이 좋다",b:"천천히 습관과 인식을 바꾸는 솔루션이 좋다"},
  {cat:"조형·디자인",a:"형태는 기능에서 나와야 한다",b:"형태는 감성에서 나와야 한다"},
  {cat:"조형·디자인",a:"단순하고 절제된 형태가 좋다",b:"풍부하고 복잡한 형태가 좋다"},
  {cat:"조형·디자인",a:"소재의 본래 질감을 드러내는 게 좋다",b:"소재를 가공해서 새로운 질감을 만드는 게 좋다"},
  {cat:"조형·디자인",a:"시간이 지나도 변하지 않는 디자인을 한다",b:"지금 이 순간에 가장 적합한 디자인을 한다"},
  {cat:"조형·디자인",a:"사용할 때 느껴지는 경험이 가장 중요하다",b:"처음 봤을 때의 인상이 가장 중요하다"},
  {cat:"조형·디자인",a:"제품이 어떻게 만들어졌는지 보여야 한다",b:"제품이 어떻게 만들어졌는지는 중요하지 않다"},
  {cat:"조형·디자인",a:"색보다 형태가 먼저다",b:"형태보다 색이 먼저다"},
  {cat:"조형·디자인",a:"디지털보다 물리적 제품이 더 끌린다",b:"물리적 제품보다 디지털이 더 끌린다"},
  {cat:"조형·디자인",a:"완성된 느낌의 마감이 좋다",b:"날것의 느낌이 남아있는 마감이 좋다"},
  {cat:"마케팅·브랜딩",a:"제품이 좋으면 마케팅은 따라온다",b:"마케팅도 디자인만큼 중요하다"},
  {cat:"마케팅·브랜딩",a:"브랜드 스토리보다 제품 자체가 말해야 한다",b:"브랜드 스토리가 제품의 가치를 만든다"},
  {cat:"마케팅·브랜딩",a:"많은 사람에게 알려지는 게 중요하다",b:"알아야 할 사람만 알면 된다"},
  {cat:"마케팅·브랜딩",a:"온라인 중심으로 브랜드를 알리고 싶다",b:"오프라인 경험 중심으로 브랜드를 알리고 싶다"},

  {cat:"마케팅·브랜딩",a:"내 이름을 전면에 내세운 브랜드를 하고 싶다",b:"브랜드 뒤에 내가 있는 게 더 좋다"},
  {cat:"마케팅·브랜딩",a:"저렴하게 많이 파는 브랜드가 끌린다",b:"비싸도 제대로 파는 브랜드가 끌린다"},

  {cat:"브랜드 가치관",a:"빠르게 많은 것을 만드는 디자이너가 되고 싶다",b:"천천히 하나를 제대로 만드는 디자이너가 되고 싶다"},
  {cat:"브랜드 가치관",a:"디자인은 문제를 해결하는 도구다",b:"디자인은 세계관을 표현하는 언어다"},
  {cat:"브랜드 가치관",a:"나의 디자인이 많은 사람의 삶을 바꾸길 원한다",b:"나의 디자인이 한 사람의 삶을 깊이 바꾸길 원한다"},
  {cat:"브랜드 가치관",a:"지속 가능성은 디자인의 필수 조건이다",b:"지속 가능성은 중요하지만 절충할 수 있다"},
  {cat:"브랜드 가치관",a:"10년 후에도 내 이름으로 작업하고 싶다",b:"10년 후에는 더 큰 시스템 안에서 일하고 싶다"}

let cur = 0;
let answers = new Array(qs.length).fill(null);

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  render();
}

function render() {
  const q = qs[cur];
  document.getElementById('cat').textContent = q.cat;
  document.getElementById('qcount').textContent = `${cur + 1} / ${qs.length}`;
  document.getElementById('prog').style.width = Math.max(2, Math.round((cur + 1) / qs.length * 100)) + '%';
  document.getElementById('card-a').textContent = q.a;
  document.getElementById('card-b').textContent = q.b;
  document.getElementById('card-a').className = 'choice-card' + (answers[cur] === 'A' ? ' selected' : '');
  document.getElementById('card-b').className = 'choice-card' + (answers[cur] === 'B' ? ' selected' : '');
  document.getElementById('back-btn').disabled = cur === 0;
}

function pick(opt) {
  answers[cur] = opt;
  document.getElementById('card-a').className = 'choice-card' + (opt === 'A' ? ' selected' : '');
  document.getElementById('card-b').className = 'choice-card' + (opt === 'B' ? ' selected' : '');
  setTimeout(() => {
    if (cur < qs.length - 1) { cur++; render(); }
    else { showResult(); }
  }, 300);
}

function goBack() {
  if (cur > 0) { cur--; render(); }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const lines = ['[디자이너 밸런스게임 문답 결과]\n'];
  let lastCat = '';
  qs.forEach((q, i) => {
    if (q.cat !== lastCat) { lines.push(`\n▶ ${q.cat}`); lastCat = q.cat; }
    const chosen = answers[i] === 'A' ? q.a : q.b;
    lines.push(`Q${i + 1}. ${q.a} vs ${q.b}\n→ 선택: ${chosen}`);
  });
  lines.push('\n---\n이 결과를 Claude 또는 NotebookLM에 붙여넣어 분석을 진행하세요.');
  document.getElementById('result-text').textContent = lines.join('\n');
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(() => {
    document.getElementById('copy-notice').textContent = '복사됐어요. Claude 또는 NotebookLM에 붙여넣으세요.';
  });
}

function restart() {
  cur = 0;
  answers = new Array(qs.length).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
  document.getElementById('copy-notice').textContent = '';
}
</script>
